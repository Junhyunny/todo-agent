name: tdd-plan
version: 1.1.0
description: >
  Step 1 of ping-pong TDD. Fetches a story from TrackerBoot MCP or accepts
  pasted content, syncs the shared tech-stack file and conventions, plans tasks
  collaboratively, and writes .tdd-session.md for the session.
category: engineering
tags: [tdd, pair-programming, planning, ping-pong, agile]
invocation: /tdd-plan <project-id> <story-id>
preconditions:
  - TrackerBoot 프로젝트 ID를 첫 번째 인수로 제공 (없으면 실행 불가)
  - TrackerBoot 스토리 ID 또는 스토리 텍스트를 두 번째 인수로 제공 (없으면 실행 불가)
  - TrackerBoot MCP configured (if using story ID)
effects:
  - Creates .tdd-sessions/{story-id}.md in the project root
  - Adds .tdd-sessions/ to .gitignore
  - Establishes task plan for the session
next_steps:
  - Run /tdd-task to execute the first task
