name: review-and-commit
version: 1.0.0
description: >
  변경된 코드를 리뷰하고, 테스트/린트/포맷 검증 후 커밋하는 스킬.
  보안 위험, 코드 중복, 모듈 분리 필요성, 구현/테스트 개선 방향을 제안하며,
  개선 사항이 있을 경우 사용자 승인 후 작업을 수행한다.
  커밋 메시지는 Conventional Commits 형식을 따른다.
category: engineering
tags: [review, commit, git, refactor, quality, lint, test, format]
invocation: /review-and-commit
preconditions:
  - git 저장소가 초기화되어 있어야 함
  - 커밋되지 않은 변경 사항이 존재해야 함
effects:
  - 변경 코드에 대한 리뷰 보고서 생성
  - 전체 테스트 실행 및 결과 보고
  - 린트 및 포맷 검증
  - 개선 사항 존재 시 계획 제시 및 사용자 승인 후 구현
  - Conventional Commits 형식의 커밋 메시지로 커밋 실행
next_steps:
  - Continue with the next feature or story
