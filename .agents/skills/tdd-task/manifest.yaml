name: tdd-task
version: 1.0.0
description: >
  Step 2 of ping-pong TDD. Reads .tdd-session.md, runs one task's full
  RED-GREEN-REFACTOR cycle with the developer, then updates the session file.
  Call repeatedly until all tasks are done.
category: engineering
tags: [tdd, pair-programming, ping-pong, red-green-refactor, testing]
invocation: /tdd-task
preconditions:
  - .tdd-session.md exists (created by /tdd-plan)
effects:
  - Updates .tdd-session.md (marks task as done)
next_steps:
  - Run /tdd-task again for the next task
  - Run /tdd-commit when all tasks are complete
