name: sync-architecture
version: 1.0.0
description: >
  프로젝트 구조, 데이터 흐름, 레이어 아키텍처, 경계(수정 금지 영역)를 분석하여
  ARCHITECTURE.md를 생성 또는 갱신하는 스킬.
  AI 에이전트가 탐색 없이 바로 작업에 들어갈 수 있는 구조 지형도를 제공한다.
category: engineering
tags: [architecture, structure, flow, boundary, context, project]
invocation: /sync-architecture
preconditions:
  - Project root is available
effects:
  - Creates or updates ARCHITECTURE.md in the project root
  - Documents directory structure, data flow, layer architecture, and boundaries
next_steps:
  - Re-run when project structure or architecture changes
