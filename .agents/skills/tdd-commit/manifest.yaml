name: tdd-commit
version: 1.1.0
description: >
  Final step of ping-pong TDD. Reads .tdd-session.md, summarizes completed
  tasks, proposes a Conventional Commits message, executes the commit, gives a
  brief optional /context and /compact reminder, and cleans up the session file.
category: engineering
tags: [tdd, pair-programming, ping-pong, commit, git]
invocation: /tdd-commit
preconditions:
  - .tdd-session.md exists with at least one completed task
effects:
  - Creates a git commit with all session changes staged
  - Optionally deletes .tdd-session.md
next_steps:
  - Run /tdd-plan to start a new session
