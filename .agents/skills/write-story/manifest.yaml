name: write-story
version: 2.0.0
description: >
  사용자 시나리오를 입력받아 INVEST 원칙에 따라 여러 개의 XP 유저 스토리로
  분리하고, 각 스토리의 인수 기준을 작성한 뒤 TrackerBoot(MCP)에 일괄 등록하는 스킬.
  페르소나 정의(persona.md)가 필수이며, 레이블 기반으로 기존 스토리를 참조해
  중복 없이 일관성 있게 스토리를 작성한다.
category: engineering
tags: [xp, story, agile, trackerboot, user-story, invest]
invocation: /write-story
preconditions:
  - TrackerBoot 프로젝트 ID를 인수로 제공 (없으면 실행 불가)
  - .agents/skills/write-story/references/persona.md 존재 (없으면 실행 불가, 직접 작성 필요)
  - TrackerBoot MCP 서버 구성 (스토리 등록 및 조회에 필요)
effects:
  - 시나리오를 INVEST 원칙에 따라 여러 스토리로 분리
  - 각 스토리의 인수 기준(GIVEN/WHEN/THEN) 작성
  - TrackerBoot에 여러 스토리 일괄 등록 (제목, 설명, 인수 기준, 레이블)
next_steps:
  - /tdd-plan <project-id> <story-id> 으로 각 스토리의 TDD 세션 시작
