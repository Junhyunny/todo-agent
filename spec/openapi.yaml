openapi: 3.1.0
info:
  title: FastAPI
  version: 0.1.0
paths:
  /agents:
    post:
      summary: Create Agent
      operationId: create_agent_agents_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostAgentRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostAgentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    PostAgentRequest:
      properties:
        name:
          type: string
          title: Name
        system_prompt:
          type: string
          title: System Prompt
      type: object
      required:
      - name
      - system_prompt
      title: PostAgentRequest
    PostAgentResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        name:
          type: string
          title: Name
        system_prompt:
          type: string
          title: System Prompt
      type: object
      required:
      - id
      - name
      - system_prompt
      title: PostAgentResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
